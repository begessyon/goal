<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FX収支ログ</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="FX LOG">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap');

:root {
  --bg: #0a0a0a;
  --surface: #111;
  --surface2: #1a1a1a;
  --border: #222;
  --accent: #00ff88;
  --text: #e8e8e8;
  --muted: #555;
  --win: #00cc66;
  --loss: #ff3355;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== 画面管理 ===== */
.screen {
  position: fixed;
  inset: 0;
  overflow-y: auto;
  background: var(--bg);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  padding-bottom: 80px;
}

.screen.hidden-right { transform: translateX(100%); pointer-events: none; }
.screen.hidden-left  { transform: translateX(-30%); pointer-events: none; }

/* ===== ヘッダー共通 ===== */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,10,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
}

.topbar-title { font-family: 'DM Mono', monospace; font-size: 0.95rem; letter-spacing: 2px; color: var(--accent); flex: 1; }
.topbar-back { background: none; border: none; color: var(--accent); font-size: 1.2rem; cursor: pointer; padding: 4px 8px 4px 0; }

/* ===== サマリー ===== */
.summary { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
.summary-item { background: var(--surface); padding: 12px 8px; text-align: center; }
.s-label { font-size: 0.58rem; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
.s-value { font-family: 'DM Mono', monospace; font-size: 1rem; font-weight: 500; }
.s-value.pos { color: var(--win); }
.s-value.neg { color: var(--loss); }
.s-value.neu { color: var(--text); }

/* ===== タブ ===== */
.tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
.tab { flex: 1; padding: 11px 4px; text-align: center; font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tabpanel { display: none; }
.tabpanel.active { display: block; }

/* ===== カレンダー ===== */
.cal-nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 6px; }
.cal-nav button { background: var(--surface2); border: 1px solid var(--border); color: var(--text); width: 36px; height: 36px; border-radius: 8px; font-size: 1.1rem; cursor: pointer; }
.cal-nav button:active { opacity: 0.6; }
.cal-month { font-family: 'DM Mono', monospace; font-size: 1rem; letter-spacing: 2px; text-align: center; }
.cal-month-pnl { font-size: 0.72rem; text-align: center; font-family: 'DM Mono', monospace; margin-top: 2px; }
.cal-weekdays { display: grid; grid-template-columns: repeat(7,1fr); padding: 8px 8px 4px; }
.cal-weekday { text-align: center; font-size: 0.62rem; color: var(--muted); }
.cal-weekday:first-child { color: #ff6688; }
.cal-weekday:last-child { color: #6688ff; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; padding: 0 8px 16px; }
.cal-day { border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; padding: 3px 2px; min-height: 46px; transition: background 0.15s; }
.cal-day:active { background: var(--surface2); }
.cal-day.empty { cursor: default; }
.cal-day.today { background: var(--surface2); }
.cal-day.has-trades { background: #0d1a0d; }
.cal-day.sun .day-num { color: #ff6688; }
.cal-day.sat .day-num { color: #6688ff; }
.day-num { font-family: 'DM Mono', monospace; font-size: 0.82rem; line-height: 1; color: var(--text); }
.cal-day.other-month .day-num { color: #2a2a2a; }
.day-pnl { font-family: 'DM Mono', monospace; font-size: 0.52rem; margin-top: 3px; line-height: 1; }

/* ===== グラフ ===== */
.chart-section { padding: 16px; }
.chart-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 14px; }
.chart-title { font-size: 0.62rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
canvas { max-height: 180px; }
.pair-item { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 11px 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.pair-name { font-family: 'DM Mono', monospace; font-size: 0.82rem; }
.pair-sub { font-size: 0.62rem; color: var(--muted); margin-top: 2px; }
.pair-pnl { font-family: 'DM Mono', monospace; font-size: 0.88rem; font-weight: 500; }

/* ===== 日別詳細画面 ===== */
.day-summary-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

.day-summary-left .day-total { font-family: 'DM Mono', monospace; font-size: 1.4rem; font-weight: 500; }
.day-summary-left .day-count { font-size: 0.68rem; color: var(--muted); margin-top: 3px; letter-spacing: 1px; }

.btn-new-trade {
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 8px;
  padding: 10px 16px;
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 2px;
  cursor: pointer;
  transition: opacity 0.2s;
}

.btn-new-trade:active { opacity: 0.7; }

/* トレードカード */
.trade-list { padding: 12px 16px; display: grid; gap: 10px; }

.trade-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  animation: slideIn 0.2s ease;
}

.trade-card.win { border-left-color: var(--win); }
.trade-card.loss { border-left-color: var(--loss); }

.trade-card-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 14px 10px;
}

.trade-card-left .tc-pair { font-family: 'DM Mono', monospace; font-size: 0.88rem; letter-spacing: 1px; }
.trade-card-left .tc-meta { font-size: 0.62rem; color: var(--muted); margin-top: 3px; }

.trade-card-right { display: flex; align-items: center; gap: 10px; }
.tc-pnl { font-family: 'DM Mono', monospace; font-size: 1.05rem; font-weight: 500; }

.tc-actions { display: flex; gap: 4px; }
.tc-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); width: 28px; height: 28px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.tc-btn:active { opacity: 0.6; }
.tc-btn.del { color: var(--loss); }

.tc-memo {
  padding: 0 14px 10px;
  font-size: 0.78rem; color: #999; line-height: 1.65; white-space: pre-wrap;
  border-top: 1px solid var(--border);
  padding-top: 8px;
}

.tc-images { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 14px 12px; }
.tc-thumb { width: 72px; height: 72px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; }
.tc-thumb:active { opacity: 0.8; }

.no-trades-day { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 0.78rem; letter-spacing: 1px; line-height: 2; }

@keyframes slideIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

/* ===== モーダル（トレード追加/編集） ===== */
.modal-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.8);
  align-items: flex-end;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border-radius: 16px 16px 0 0;
  border-top: 1px solid var(--border);
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  animation: slideUp 0.25s ease;
  padding-bottom: env(safe-area-inset-bottom);
}

@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  background: var(--surface);
}

.modal-title { font-family: 'DM Mono', monospace; font-size: 0.85rem; letter-spacing: 2px; color: var(--accent); }
.modal-close { background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer; padding: 0 4px; }

.modal-body { padding: 16px 20px; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 0.6rem; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }

input[type="number"], input[type="text"], select, textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 7px;
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.92rem;
  padding: 10px 12px; outline: none; transition: border-color 0.2s; -webkit-appearance: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
select option { background: #1a1a1a; }
textarea { resize: none; height: 80px; font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 0.85rem; line-height: 1.6; }

/* 画像アップロード */
.img-upload-area {
  border: 1.5px dashed var(--border); border-radius: 8px;
  padding: 14px; text-align: center; cursor: pointer;
  transition: border-color 0.2s; position: relative; margin-bottom: 10px;
}
.img-upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.img-upload-label { font-size: 0.72rem; color: var(--muted); letter-spacing: 1px; pointer-events: none; }
.img-upload-label span { color: var(--accent); }

.img-preview-list { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
.img-preview-wrap { position: relative; width: 72px; height: 72px; }
.img-preview-wrap img { width: 72px; height: 72px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }
.img-preview-del { position: absolute; top: -6px; right: -6px; background: var(--loss); color: #fff; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

.btn-save {
  width: 100%; padding: 13px; background: var(--accent); color: #000; border: none; border-radius: 8px;
  font-family: 'DM Mono', monospace; font-size: 0.82rem; font-weight: 500; letter-spacing: 2px;
  text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; margin-top: 4px;
}
.btn-save:active { opacity: 0.7; }

/* ===== ライトボックス ===== */
.lightbox { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 95vw; max-height: 90vh; border-radius: 8px; object-fit: contain; }
.lightbox-close { position: absolute; top: 16px; right: 16px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); width: 36px; height: 36px; border-radius: 50%; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>

<!-- ===== メイン画面 ===== -->
<div class="screen" id="screen-main">
  <div class="topbar">
    <div class="topbar-title">FX LOG</div>
    <button onclick="openSettings()" style="background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:4px">⚙️</button>
  </div>

  <div class="summary">
    <div class="summary-item"><div class="s-label">累計</div><div class="s-value neu" id="total-pnl">¥0</div></div>
    <div class="summary-item"><div class="s-label">今月</div><div class="s-value neu" id="month-pnl">¥0</div></div>
    <div class="summary-item"><div class="s-label">勝率</div><div class="s-value neu" id="win-rate">--%</div></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('cal')">カレンダー</div>
    <div class="tab" onclick="switchTab('chart')">グラフ</div>
  </div>

  <div class="tabpanel active" id="tabpanel-cal">
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <div>
        <div class="cal-month" id="cal-month-label"></div>
        <div class="cal-month-pnl" id="cal-month-pnl"></div>
      </div>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-weekdays">
      <div class="cal-weekday">日</div><div class="cal-weekday">月</div><div class="cal-weekday">火</div>
      <div class="cal-weekday">水</div><div class="cal-weekday">木</div><div class="cal-weekday">金</div><div class="cal-weekday">土</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div class="tabpanel" id="tabpanel-chart">
    <div class="chart-section">
      <div class="chart-box"><div class="chart-title">損益推移（累計）</div><canvas id="chart-cum"></canvas></div>
      <div class="chart-box"><div class="chart-title">月別損益</div><canvas id="chart-monthly"></canvas></div>
      <div class="chart-title" style="margin-bottom:8px">通貨ペア別</div>
      <div id="pair-stats"></div>
    </div>
  </div>
</div>

<!-- ===== 日別詳細画面 ===== -->
<div class="screen hidden-right" id="screen-day">
  <div class="topbar">
    <button class="topbar-back" onclick="goBack()">‹</button>
    <div class="topbar-title" id="day-screen-title"></div>
  </div>

  <div class="day-summary-bar">
    <div class="day-summary-left">
      <div class="day-total" id="day-total">¥0</div>
      <div class="day-count" id="day-count">0トレード</div>
    </div>
    <button class="btn-new-trade" onclick="openModal()">+ 追加</button>
  </div>

  <div class="trade-list" id="trade-list"></div>
</div>

<!-- ===== トレード追加/編集モーダル ===== -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">NEW TRADE</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group" style="margin-bottom:0">
          <label>損益（円）</label>
          <input type="number" id="m-pnl" placeholder="例: 3500">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label>通貨ペア</label>
          <select id="m-pair">
            <option>USD/JPY</option><option>EUR/JPY</option><option>GBP/JPY</option>
            <option>AUD/JPY</option><option>EUR/USD</option><option>GBP/USD</option>
            <option>XAU/USD</option><option>その他</option>
          </select>
        </div>
      </div>
      <div class="form-row" style="margin-bottom:12px">
        <div class="form-group" style="margin-bottom:0">
          <label>回数</label>
          <input type="number" id="m-count" value="1" min="1">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label>方向</label>
          <select id="m-direction">
            <option value="">--</option>
            <option value="LONG">LONG ↑</option>
            <option value="SHORT">SHORT ↓</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>メモ</label>
        <textarea id="m-memo" placeholder="エントリー理由、気づき、反省など..."></textarea>
      </div>
      <div class="form-group">
        <label>チャート画像</label>
        <div class="img-upload-area">
          <input type="file" id="m-img-input" accept="image/*" multiple onchange="handleImages(event)">
          <div class="img-upload-label">📷 タップして画像を選択<br><span>複数枚OK</span></div>
        </div>
        <div class="img-preview-list" id="m-img-preview"></div>
        <button id="btn-analyze" onclick="analyzeImages()" style="width:100%;padding:10px;background:var(--surface2);border:1px solid var(--border);color:var(--accent);border-radius:7px;font-family:'DM Mono',monospace;font-size:0.75rem;letter-spacing:2px;cursor:pointer;margin-top:6px;display:none">🤖 AI分析する</button>
        <div id="analyze-result" style="display:none;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:12px;margin-top:8px;font-size:0.78rem;line-height:1.7;color:var(--text)"></div>
      </div>
      <button class="btn-save" onclick="saveTrade()">保存する</button>
    </div>
  </div>
</div>

<!-- ライトボックス -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">×</button>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- 設定モーダル -->
<div class="modal-overlay" id="settings-overlay" onclick="handleSettingsOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">SETTINGS</div>
      <button class="modal-close" onclick="closeSettings()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Claude API Key</label>
        <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off">
        <div style="font-size:0.65rem;color:var(--muted);margin-top:6px;line-height:1.6">キーはこのデバイスのみに保存されます。<br>console.anthropic.com で取得できます。</div>
      </div>
      <button class="btn-save" onclick="saveApiKey()">保存する</button>
      <div id="api-key-status" style="text-align:center;font-size:0.72rem;margin-top:10px;color:var(--muted)"></div>
    </div>
  </div>
</div>

<script>
const KEY = 'fx_v4';
let trades = (() => { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } })();
let calYear, calMonth, currentDate = null;
let editingId = null;
let pendingImages = [];
let charts = {};

function save() { localStorage.setItem(KEY, JSON.stringify(trades)); }

function fmt(n) {
  const abs = '¥' + Math.abs(Math.round(n)).toLocaleString('ja-JP');
  return (n > 0 ? '+' : n < 0 ? '-' : '') + abs;
}

function fmtDate(ds) {
  return new Date(ds + 'T00:00:00').toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
}

// ===== 初期化 =====
function init() {
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
  updateSummary();
  renderCalendar();
}

// ===== サマリー =====
function updateSummary() {
  const total = trades.reduce((s,t) => s+t.pnl, 0);
  const now = new Date();
  const month = trades.filter(t => {
    const d = new Date(t.date+'T00:00:00');
    return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
  }).reduce((s,t) => s+t.pnl, 0);
  const wins = trades.filter(t => t.pnl > 0).length;
  const rate = trades.length ? Math.round(wins/trades.length*100) : null;

  const te = document.getElementById('total-pnl');
  te.textContent = fmt(total);
  te.className = 's-value '+(total>0?'pos':total<0?'neg':'neu');

  const me = document.getElementById('month-pnl');
  me.textContent = fmt(month);
  me.className = 's-value '+(month>0?'pos':month<0?'neg':'neu');

  document.getElementById('win-rate').textContent = rate!==null ? rate+'%' : '--%';
}

// ===== カレンダー =====
function renderCalendar() {
  document.getElementById('cal-month-label').textContent = `${calYear}年${calMonth+1}月`;

  const dayMap = {};
  trades.forEach(t => { dayMap[t.date] = (dayMap[t.date]||0) + t.pnl; });

  const monthPnl = Object.entries(dayMap)
    .filter(([d]) => { const dt=new Date(d+'T00:00:00'); return dt.getFullYear()===calYear && dt.getMonth()===calMonth; })
    .reduce((s,[,v]) => s+v, 0);

  const mpe = document.getElementById('cal-month-pnl');
  mpe.textContent = monthPnl!==0 ? fmt(monthPnl) : '';
  mpe.style.color = monthPnl>0 ? 'var(--win)' : 'var(--loss)';

  const today = new Date().toISOString().split('T')[0];
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const prevDays = new Date(calYear, calMonth, 0).getDate();

  let html = '';

  for (let i=0; i<firstDay; i++) {
    const d = prevDays-firstDay+1+i;
    html += `<div class="cal-day empty other-month ${i===0?'sun':i===6?'sat':''}"><span class="day-num">${d}</span></div>`;
  }

  for (let d=1; d<=daysInMonth; d++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(ds+'T00:00:00').getDay();
    const pnl = dayMap[ds];
    const hasTrades = trades.some(t => t.date===ds);
    const dowCls = dow===0?'sun':dow===6?'sat':'';
    const cls = [ds===today?'today':'', hasTrades?'has-trades':'', dowCls].filter(Boolean).join(' ');

    let pnlHtml = '';
    if (pnl!==undefined) {
      const color = pnl>0?'var(--win)':'var(--loss)';
      const v = Math.abs(Math.round(pnl)).toLocaleString('ja-JP');
      pnlHtml = `<div class="day-pnl" style="color:${color}">${pnl>0?'+':'−'}¥${v}</div>`;
    }

    html += `<div class="cal-day ${cls}" onclick="openDayScreen('${ds}')"><span class="day-num">${d}</span>${pnlHtml}</div>`;
  }

  const lastDow = new Date(calYear, calMonth, daysInMonth).getDay();
  for (let i=1; i<=6-lastDow; i++) {
    html += `<div class="cal-day empty other-month ${(lastDow+i)===6?'sat':''}"><span class="day-num">${i}</span></div>`;
  }

  document.getElementById('cal-grid').innerHTML = html;
}

function changeMonth(delta) {
  calMonth += delta;
  if (calMonth<0) { calMonth=11; calYear--; }
  if (calMonth>11) { calMonth=0; calYear++; }
  renderCalendar();
}

// ===== 画面遷移 =====
function openDayScreen(ds) {
  currentDate = ds;
  document.getElementById('day-screen-title').textContent = fmtDate(ds);
  renderDayScreen();
  document.getElementById('screen-main').classList.add('hidden-left');
  document.getElementById('screen-day').classList.remove('hidden-right');
  document.getElementById('screen-day').scrollTop = 0;
}

function goBack() {
  document.getElementById('screen-main').classList.remove('hidden-left');
  document.getElementById('screen-day').classList.add('hidden-right');
  updateSummary();
  renderCalendar();
}

// ===== 日別詳細 =====
function renderDayScreen() {
  const dayTrades = trades.filter(t => t.date===currentDate);
  const total = dayTrades.reduce((s,t) => s+t.pnl, 0);

  const te = document.getElementById('day-total');
  te.textContent = fmt(total);
  te.style.color = total>0?'var(--win)':total<0?'var(--loss)':'var(--text)';

  document.getElementById('day-count').textContent = `${dayTrades.length}トレード`;

  const el = document.getElementById('trade-list');
  if (dayTrades.length===0) {
    el.innerHTML = '<div class="no-trades-day">📋 まだ記録がありません<br>「+ 追加」からトレードを記録しましょう</div>';
    return;
  }

  el.innerHTML = dayTrades.map((t,idx) => {
    const winCls = t.pnl>=0 ? 'win' : 'loss';
    const dirLabel = t.direction ? `<span style="color:${t.direction==='LONG'?'var(--win)':'var(--loss)'}"> · ${t.direction}</span>` : '';

    const imgs = (t.images||[]).map((src,i) =>
      `<img class="tc-thumb" src="${src}" onclick="openLightbox(${t.id},${i})" alt="chart">`
    ).join('');

    return `
      <div class="trade-card ${winCls}" id="tc-${t.id}">
        <div class="trade-card-header">
          <div class="trade-card-left">
            <div class="tc-pair">${t.pair}${dirLabel}</div>
            <div class="tc-meta">${t.count}回</div>
          </div>
          <div class="trade-card-right">
            <div class="tc-pnl" style="color:${t.pnl>=0?'var(--win)':'var(--loss)'}">${fmt(t.pnl)}</div>
            <div class="tc-actions">
              <button class="tc-btn" onclick="openModal(${t.id})" title="編集">✏️</button>
              <button class="tc-btn del" onclick="deleteTrade(${t.id})" title="削除">×</button>
            </div>
          </div>
        </div>
        ${t.memo ? `<div class="tc-memo">${escHtml(t.memo)}</div>` : ''}
        ${imgs ? `<div class="tc-images">${imgs}</div>` : ''}
      </div>`;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== モーダル =====
function openModal(id = null) {
  editingId = id;
  pendingImages = [];

  document.getElementById('modal-title').textContent = id ? 'EDIT TRADE' : 'NEW TRADE';
  document.getElementById('m-img-preview').innerHTML = '';
  document.getElementById('m-img-input').value = '';

  if (id) {
    const t = trades.find(t => t.id===id);
    if (!t) return;
    document.getElementById('m-pnl').value = t.pnl;
    document.getElementById('m-pair').value = t.pair;
    document.getElementById('m-count').value = t.count;
    document.getElementById('m-direction').value = t.direction||'';
    document.getElementById('m-memo').value = t.memo||'';
    pendingImages = [...(t.images||[])];
    renderModalPreviews();
  } else {
    document.getElementById('m-pnl').value = '';
    document.getElementById('m-pair').value = 'USD/JPY';
    document.getElementById('m-count').value = '1';
    document.getElementById('m-direction').value = '';
    document.getElementById('m-memo').value = '';
  }

  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('m-pnl').focus(), 300);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingId = null;
  pendingImages = [];
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function handleImages(e) {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => { pendingImages.push(ev.target.result); renderModalPreviews(); };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

function renderModalPreviews() {
  document.getElementById('m-img-preview').innerHTML = pendingImages.map((src,i) => `
    <div class="img-preview-wrap">
      <img src="${src}" alt="preview">
      <button class="img-preview-del" onclick="removePending(${i})">×</button>
    </div>`).join('');
  document.getElementById("btn-analyze").style.display = pendingImages.length > 0 ? "block" : "none";
  document.getElementById("analyze-result").style.display = "none";
}

function removePending(i) {
  pendingImages.splice(i,1);
  renderModalPreviews();
}

function saveTrade() {
  const pnl = parseFloat(document.getElementById('m-pnl').value);
  if (isNaN(pnl)) { alert('損益を入力してください'); return; }

  const data = {
    pnl,
    pair: document.getElementById('m-pair').value,
    count: parseInt(document.getElementById('m-count').value)||1,
    direction: document.getElementById('m-direction').value,
    memo: document.getElementById('m-memo').value.trim(),
    images: [...pendingImages],
    date: currentDate
  };

  if (editingId) {
    const idx = trades.findIndex(t => t.id===editingId);
    if (idx!==-1) trades[idx] = { ...trades[idx], ...data };
  } else {
    trades.push({ id: Date.now(), ...data });
  }

  save();
  closeModal();
  renderDayScreen();
}

function deleteTrade(id) {
  if (!confirm('削除しますか？')) return;
  trades = trades.filter(t => t.id!==id);
  save();
  renderDayScreen();
}

// ===== ライトボックス =====
function openLightbox(tradeId, imgIdx) {
  const t = trades.find(t => t.id===tradeId);
  if (!t||!t.images) return;
  document.getElementById('lightbox-img').src = t.images[imgIdx];
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

// ===== タブ =====
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', ['cal','chart'][i]===tab));
  document.querySelectorAll('.tabpanel').forEach(el => el.classList.remove('active'));
  document.getElementById('tabpanel-'+tab).classList.add('active');
  if (tab==='chart') renderCharts();
}

// ===== グラフ =====
function renderCharts() {
  const sorted = [...trades].sort((a,b) => a.date.localeCompare(b.date));
  let cum=0; const cumL=[],cumD=[];
  sorted.forEach(t => {
    cum+=t.pnl;
    cumL.push(new Date(t.date+'T00:00:00').toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'}));
    cumD.push(cum);
  });

  if (charts.cum) charts.cum.destroy();
  const isPos=(cumD[cumD.length-1]||0)>=0;
  charts.cum = new Chart(document.getElementById('chart-cum').getContext('2d'), {
    type:'line',
    data:{labels:cumL,datasets:[{data:cumD,borderColor:isPos?'#00ff88':'#ff3355',backgroundColor:isPos?'rgba(0,255,136,0.07)':'rgba(255,51,85,0.07)',borderWidth:2,pointRadius:cumD.length>30?0:3,fill:true,tension:0.3}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#555',font:{size:9}},grid:{color:'#1a1a1a'}},y:{ticks:{color:'#555',font:{size:9},callback:v=>'¥'+v.toLocaleString()},grid:{color:'#1a1a1a'}}}}
  });

  const mMap={};
  trades.forEach(t => { const d=new Date(t.date+'T00:00:00'); const k=`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}`; mMap[k]=(mMap[k]||0)+t.pnl; });
  const mK=Object.keys(mMap).sort(),mV=mK.map(k=>mMap[k]);

  if (charts.monthly) charts.monthly.destroy();
  charts.monthly = new Chart(document.getElementById('chart-monthly').getContext('2d'), {
    type:'bar',
    data:{labels:mK,datasets:[{data:mV,backgroundColor:mV.map(v=>v>=0?'rgba(0,255,136,0.65)':'rgba(255,51,85,0.65)'),borderRadius:4}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#555',font:{size:9}},grid:{display:false}},y:{ticks:{color:'#555',font:{size:9},callback:v=>'¥'+v.toLocaleString()},grid:{color:'#1a1a1a'}}}}
  });

  const pMap={};
  trades.forEach(t => { if(!pMap[t.pair]) pMap[t.pair]={total:0,count:0}; pMap[t.pair].total+=t.pnl; pMap[t.pair].count+=t.count; });
  document.getElementById('pair-stats').innerHTML = Object.entries(pMap).sort((a,b)=>b[1].total-a[1].total).map(([p,s])=>`
    <div class="pair-item">
      <div><div class="pair-name">${p}</div><div class="pair-sub">${s.count}回</div></div>
      <div class="pair-pnl" style="color:${s.total>=0?'var(--win)':'var(--loss)'}">${fmt(s.total)}</div>
    </div>`).join('');
}


// ===== 設定 =====
function openSettings() {
  const key = localStorage.getItem("claude_api_key") || "";
  document.getElementById("api-key-input").value = key ? "sk-ant-..." : "";
  document.getElementById("api-key-status").textContent = key ? "✓ APIキー設定済み" : "";
  document.getElementById("api-key-status").style.color = "var(--win)";
  document.getElementById("settings-overlay").classList.add("open");
}

function closeSettings() {
  document.getElementById("settings-overlay").classList.remove("open");
}

function handleSettingsOverlay(e) {
  if (e.target === document.getElementById("settings-overlay")) closeSettings();
}

function saveApiKey() {
  const key = document.getElementById("api-key-input").value.trim();
  if (!key || !key.startsWith("sk-ant-")) { alert("正しいAPIキーを入力してください（sk-ant-...）"); return; }
  localStorage.setItem("claude_api_key", key);
  document.getElementById("api-key-status").textContent = "✓ 保存しました";
  document.getElementById("api-key-status").style.color = "var(--win)";
  setTimeout(closeSettings, 1000);
}

// ===== AI画像分析 =====
async function analyzeImages() {
  const apiKey = localStorage.getItem("claude_api_key");
  if (!apiKey) { alert("設定画面でAPIキーを入力してください"); openSettings(); return; }
  if (pendingImages.length === 0) { alert("画像を選択してください"); return; }

  const btn = document.getElementById("btn-analyze");
  const resultEl = document.getElementById("analyze-result");
  btn.textContent = "🤖 分析中...";
  btn.disabled = true;
  resultEl.style.display = "block";
  resultEl.textContent = "チャートを分析しています...";

  try {
    const imageContents = pendingImages.map(src => ({
      type: "image",
      source: { type: "base64", media_type: src.match(/data:(.*?);/)[1], data: src.split(",")[1] }
    }));

    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({
        model: "claude-opus-4-5",
        max_tokens: 1024,
        messages: [{ role: "user", content: [
          ...imageContents,
          { type: "text", text: "このFXチャート画像を分析してください。\n以下を日本語で答えてください：\n1. 通貨ペア（わかれば）\n2. エントリー方向（LONGまたはSHORT、わかれば）\n3. 損益金額（わかれば、円またはpips）\n4. チャートの状況・根拠の分析（200文字程度）\n\nJSON形式で返してください：{pair, direction, pnl, analysis}" }
        ]}]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const text = data.content[0].text;
    let parsed = null;
    try {
      const match = text.match(/\{[\s\S]*\}/);
      if (match) parsed = JSON.parse(match[0]);
    } catch(e) {}

    if (parsed) {
      if (parsed.pair && parsed.pair !== "不明") document.getElementById("m-pair").value = parsed.pair.includes("/") ? parsed.pair : "その他";
      if (parsed.direction === "LONG" || parsed.direction === "SHORT") document.getElementById("m-direction").value = parsed.direction;
      if (parsed.pnl && !isNaN(parseFloat(parsed.pnl))) document.getElementById("m-pnl").value = parseFloat(parsed.pnl);
      if (parsed.analysis) document.getElementById("m-memo").value = parsed.analysis;

      resultEl.innerHTML = `<div style="color:var(--accent);font-size:0.7rem;letter-spacing:1px;margin-bottom:6px">✓ 分析完了 - フォームに自動入力しました</div>${parsed.analysis || text}`;
    } else {
      resultEl.textContent = text;
    }
  } catch(e) {
    resultEl.style.color = "var(--loss)";
    resultEl.textContent = "エラー: " + e.message;
  } finally {
    btn.textContent = "🤖 再分析する";
    btn.disabled = false;
  }
}
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

init();
